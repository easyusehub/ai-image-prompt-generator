<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Prompt Studio | EasyUseHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --accent: #06b6d4; --bg: #0b0f1a;
            --card: rgba(255, 255, 255, 0.03); --text: #f1f5f9;
        }
        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0b0f1a 100%);
            color: var(--text); min-height: 100vh;
        }
        .container { width: 92%; max-width: 1000px; margin: 40px auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        .logo-text { font-size: 14px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        h1 { font-size: 42px; font-weight: 800; margin: 10px 0; background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Generator Interface */
        .glass-ui {
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); padding: 35px;
            border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px; color: #fff; font-size: 16px;
            resize: none; box-sizing: border-box; margin-bottom: 25px; transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); outline: none; }

        /* Multi-Option Grid */
        .options-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .opt-group { text-align: left; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        select {
            width: 100%; background: #161b22; border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; padding: 12px; border-radius: 10px; cursor: pointer; outline: none; font-size: 13px;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 18px; border-radius: 14px;
            width: 100%; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); }

        /* Results Display */
        #resultBox {
            display: none; margin-top: 35px; background: rgba(255,255,255,0.02);
            border-radius: 18px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .copy-button {
            background: #10b981; color: white; border: none; padding: 12px 25px;
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%;
        }

        /* Ad Sections */
        .ad-container { margin: 30px 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .ad-box {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .ad-box:hover { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .blue-ad { border-left: 4px solid var(--primary); }
        .green-ad { border-left: 4px solid #10b981; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">EasyUseHub Elite Engine</div>
        <h1>AI Prompt Studio Pro</h1>
    </header>

    <div class="ad-box blue-ad" style="margin-bottom: 25px;" onclick="window.open('https://easyusehub.blogspot.com', '_blank')">
        <b style="color: var(--primary)">💎 ACCESS 46+ PREMIUM TOOLS</b>
        <p style="font-size: 13px; margin: 5px 0; color: #94a3b8;">PDF Editors, Financial Calculators, and Image Utilities for Free.</p>
    </div>

    <main class="glass-ui">
        <label>Main Vision / Concept</label>
        <textarea id="mainInput" placeholder="A futuristic city with rain-slicked streets and neon signs..."></textarea>

        <div class="options-grid">
            <div class="opt-group">
                <label>Art Style</label>
                <select id="style">
                    <option value="Photorealistic, 8k">Photorealistic</option>
                    <option value="Cyberpunk, futuristic, neon">Cyberpunk</option>
                    <option value="Studio Ghibli, Anime aesthetic">Anime Style</option>
                    <option value="Surrealism, dreamlike">Surrealism</option>
                    <option value="3D Pixar, Disney style render">3D Animation</option>
                    <option value="Steampunk, Victorian tech">Steampunk</option>
                    <option value="Abstract Modern Art">Abstract</option>
                    <option value="Cinematic Movie Scene">Cinematic</option>
                    <option value="Dark Fantasy, gothic">Dark Fantasy</option>
                </select>
            </div>

            <div class="opt-group">
                <label>Lighting & Atmosphere</label>
                <select id="lighting">
                    <option value="Volumetric Lighting, god rays">God Rays</option>
                    <option value="Golden Hour, warm sunset">Golden Hour</option>
                    <option value="Neon Glow, vibrant colors">Neon Pulse</option>
                    <option value="Moody, Low Light, Film Noir">Dark & Moody</option>
                    <option value="Soft Ambient Lighting">Soft Light</option>
                    <option value="Bioluminescent, glowing plants">Bioluminescent</option>
                    <option value="Rim Lighting, high contrast">Rim Light</option>
                </select>
            </div>

            <div class="opt-group">
                <label>Camera & Lens</label>
                <select id="camera">
                    <option value="Wide Angle, Panorama">Wide Angle</option>
                    <option value="Macro Lens, Extreme Close-up">Macro</option>
                    <option value="85mm Portrait Lens, Bokeh">Portrait (Bokeh)</option>
                    <option value="Bird's Eye View, Aerial">Aerial View</option>
                    <option value="Fisheye Lens, Distorted">Fisheye</option>
                    <option value="Low Angle, Heroic shot">Low Angle</option>
                </select>
            </div>

            <div class="opt-group">
                <label>Aspect Ratio (Size)</label>
                <select id="ratio">
                    <option value="--ar 16:9">Widescreen (16:9)</option>
                    <option value="--ar 9:16">Portrait (9:16)</option>
                    <option value="--ar 1:1">Square (1:1)</option>
                    <option value="--ar 4:5">Instagram (4:5)</option>
                    <option value="--ar 3:2">Photo Standard (3:2)</option>
                </select>
            </div>

            <div class="opt-group">
                <label>Image Quality</label>
                <select id="quality">
                    <option value="Masterpiece, Award Winning">Masterpiece</option>
                    <option value="Unreal Engine 5 Render, Ray Tracing">UE5 Render</option>
                    <option value="8k, Highly Detailed, Intricate">Ultra HD</option>
                    <option value="V-Ray Render, Realistic Textures">V-Ray Pro</option>
                </select>
            </div>

            <div class="opt-group">
                <label>AI Model</label>
                <select id="model">
                    <option value="--v 6.0">Midjourney V6</option>
                    <option value="--v 5.2">Midjourney V5.2</option>
                    <option value="DALL-E 3 Style">DALL-E 3</option>
                    <option value="Stable Diffusion XL">SDXL Pro</option>
                </select>
            </div>
        </div>

        <button class="action-btn" onclick="generateProPrompt()">ENGAGE AI ENGINE</button>

        <div id="resultBox">
            <div style="font-size: 11px; color: var(--accent); font-weight: 800; margin-bottom: 10px; letter-spacing: 1px;">FINAL MASTER PROMPT:</div>
            <div id="finalText" style="line-height: 1.6; font-size: 15px; color: #e2e8f0;"></div>
            <button class="copy-button" onclick="copyPrompt()">COPY MASTER PROMPT</button>
        </div>
    </main>

    <div class="ad-container">
        <div class="ad-box green-ad" onclick="window.open('https://easyusehub.blogspot.com/p/image-compressor.html', '_blank')">
            <b>⚡ Fast Image Compressor</b>
            <p style="font-size: 12px; color: #94a3b8;">Optimize images without losing quality.</p>
        </div>
    </div>
</div>

<script>
    function generateProPrompt() {
        const idea = document.getElementById('mainInput').value.trim();
        if(!idea) return alert("Please enter your vision!");

        const style = document.getElementById('style').value;
        const lighting = document.getElementById('lighting').value;
        const camera = document.getElementById('camera').value;
        const ratio = document.getElementById('ratio').value;
        const quality = document.getElementById('quality').value;
        const model = document.getElementById('model').value;

        // Final Construction
        const fullPrompt = `${idea}, ${style}, ${lighting}, ${camera}, ${quality}, hyper-realistic, intricate details, trending on ArtStation, cinematic composition ${model} ${ratio}`;

        document.getElementById('finalText').innerText = fullPrompt;
        document.getElementById('resultBox').style.display = "block";
    }

    function copyPrompt() {
        const text = document.getElementById('finalText').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Prompt Copied to Clipboard!"));
    }
</script>

</body>
</html>
